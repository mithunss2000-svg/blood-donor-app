<!DOCTYPE html>
<html>

<head>

<title>Blood Donor Finder</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script src="firebase.js"></script>
<script src="app.js"></script>

</head>

<body>

<h1>🩸 Blood Donor Finder</h1>

<div class="container">

<h2>Register Donor</h2>

<input id="name" placeholder="Name">

<select id="blood">
<option value="">Select Blood Group</option>
<option>A+</option>
<option>A-</option>
<option>B+</option>
<option>B-</option>
<option>O+</option>
<option>O-</option>
<option>AB+</option>
<option>AB-</option>
</select>

<input id="phone" placeholder="Phone">

<input id="city" placeholder="City">

<button onclick="addDonor()">Register Donor</button>

<hr>

<h2>Search Donor</h2>

<select id="searchBlood">
<option value="">Select Blood Group</option>
<option>A+</option>
<option>A-</option>
<option>B+</option>
<option>B-</option>
<option>O+</option>
<option>O-</option>
<option>AB+</option>
<option>AB-</option>
</select>

<input id="searchCity" placeholder="City">

<button onclick="searchDonor()">Search</button>

<button onclick="findNearbyDonors()">📍 Near Me</button>

<div id="results"></div>

<div id="map"></div>

</div>

<script>

if ('serviceWorker' in navigator) {
navigator.serviceWorker.register('sw.js');
}

</script>

<script src="https://maps.googleapis.com/maps/api/js?key=YOUR_GOOGLE_MAP_KEY&callback=initMap" async defer></script>

</body>
</html>
